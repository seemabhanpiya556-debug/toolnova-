<!DOCTYPE html>
<html>
<head>
<title>ToolNova - AI Tools & Innovation Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f7fb;
text-align:center;
}

header{
background:#0d6efd;
color:white;
padding:20px;
}

.logo{
width:140px;
margin-top:15px;
border-radius:15px;
}

.hero{
padding:30px;
}

.button{
display:inline-block;
background:#0d6efd;
color:white;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
margin-top:15px;
}

.tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<header>
<h1>ToolNova</h1>
<p>AI Tools & Innovation Platform</p>
</header>

<img src="777235592_1784137686868875.jpg" class="logo">

<div class="hero">
<h2>Welcome to ToolNova</h2>
<p>Discover the best AI tools for writing, images, videos and productivity.</p>

<a href="#" class="button">Explore Tools</a>
</div>

<div class="tools">

<div class="card">
<h3>AI Chat</h3>
<p>Smart AI Assistant</p>
</div>

<div class="card">
<h3>AI Image</h3>
<p>Create AI Images</p>
</div>

<div class="card">
<h3>AI Video</h3>
<p>Generate Videos</p>
</div>

<div class="card">
<h3>AI Writing</h3>
<p>Write Faster</p>
</div>

</div>

</body>
</html>
